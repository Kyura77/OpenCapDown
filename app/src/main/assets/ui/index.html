<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>OpenCapDown</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header id="top-bar">
    <button id="btn-back" class="icon-btn" onclick="navigateBack()">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <h1 id="screen-title">OpenCapDown</h1>
    <button id="btn-search" class="icon-btn" onclick="navigate('search')">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M16 16l5 5"/></svg>
    </button>
  </header>
  <main id="content"></main>
  <nav id="bottom-nav">
    <button data-route="library" class="nav-item active" onclick="navigate('library')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      </span>
      <span class="nav-label">Biblioteca</span>
    </button>
    <button data-route="downloads" class="nav-item" onclick="navigate('downloads')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      </span>
      <span class="nav-label">Downloads</span>
    </button>
    <button data-route="settings" class="nav-item" onclick="navigate('settings')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </span>
      <span class="nav-label">Ajustes</span>
    </button>
  </nav>
</div>
<div id="toast-container"></div>
<script src="js/app.js"></script>
</body>
</html>
